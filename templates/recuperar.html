<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Recuperar Contraseña</title>
<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#061827,#0d1b2a,#001d3d);
}
.box{
background:white;
width:400px;
max-width:90%;
padding:35px;
border-radius:15px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.35);
}
img{
width:160px;
margin-bottom:15px;
}
h2{
color:#0d1b2a;
margin-bottom:10px;
}
p{
color:#555;
font-size:14px;
margin-bottom:20px;
}
input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
margin-bottom:15px;
}
button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#0077b6;
color:white;
font-weight:bold;
cursor:pointer;
}
a{
display:block;
margin-top:15px;
color:#0077b6;
text-decoration:none;
}
#mensaje{
margin-top:15px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="box">
<img src="/static/img/logo.png">
<h2>Recuperar Contraseña</h2>
<p>Ingresa tu usuario o correo registrado.</p>

<input type="text" id="dato" placeholder="Usuario o correo">

<button onclick="recuperar()">Enviar recuperación</button>

<a href="login.html">Volver al login</a>

<div id="mensaje"></div>
</div>

<script>
async function recuperar(){
const dato=document.getElementById("dato").value.trim();
const mensaje=document.getElementById("mensaje");

if(dato===""){
mensaje.style.color="red";
mensaje.innerText="Ingresa tu usuario o correo.";
return;
}

mensaje.style.color="#0077b6";
mensaje.innerText="Enviando...";

try{
const res=await fetch("/api/recuperarPassword",{
method:"POST",
body:new URLSearchParams({dato:dato})
});

const data=await res.json();

if(data.result==="ok"){
mensaje.style.color="green";
mensaje.innerText="✅ Revisa tu correo. Te enviamos tus datos de acceso.";
}else{
mensaje.style.color="red";
mensaje.innerText="❌ " + data.mensaje;
}

}catch(e){
mensaje.style.color="red";
mensaje.innerText="Error de conexión con el servidor.";
}
}
</script>

</body>
</html>
